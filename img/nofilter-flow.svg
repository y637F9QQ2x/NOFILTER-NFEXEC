<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1051" font-family="Segoe UI,Arial,sans-serif" font-size="13">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#333"/></marker>
  <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#c0392b"/></marker></defs>
  <rect width="820" height="1051" fill="#fff"/>
  <text x="410" y="32" text-anchor="middle" fill="#111" font-size="18" font-weight="bold">NOFILTER — How It Works</text>
  <text x="410" y="52" text-anchor="middle" fill="#888" font-size="12">Escalate to SYSTEM via WFP kernel-space token duplication</text>
  <rect x="30" y="72" width="760" height="100" rx="6" fill="#f7f7f7" stroke="#bbb"/>
  <text x="50" y="92" fill="#555" font-size="12" font-weight="bold">OPERATOR SIDE (Havoc Client)</text>
  <rect x="50" y="106" width="180" height="38" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="130" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">nofilter</text>
  <line x1="230" y1="125" x2="278" y2="125" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="283" y="106" width="280" height="38" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="423" y="123" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">Pack target PID (0 = auto-detect)</text>
  <text x="423" y="139" text-anchor="middle" fill="#111" font-size="12">InlineExecute sends BOF to Demon</text>
  <text x="580" y="120" fill="#888" font-size="10">nofilter.x64.o sent to target</text>
  <line x1="410" y1="172" x2="410" y2="206" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="425" y="193" text-anchor="start" fill="#555" font-size="11">sent to target</text>
  <rect x="30" y="208" width="760" height="725" rx="6" fill="#f7f7f7" stroke="#bbb"/>
  <text x="50" y="228" fill="#555" font-size="12" font-weight="bold">TARGET SIDE (Demon — in-memory, no new process)</text>
  <rect x="200" y="246" width="420" height="40" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="271" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">1. Find BFE service PID + SYSTEM process PID</text>
  <text x="640" y="256" fill="#888" font-size="10">SCM query for BFE PID</text>
  <text x="640" y="270" fill="#888" font-size="10">NtQuerySysInfo for lsass PID</text>
  <line x1="410" y1="286" x2="410" y2="320" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="200" y="320" width="420" height="40" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="345" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">2. Enable SeDebugPrivilege + open both processes</text>
  <text x="640" y="330" fill="#888" font-size="10">RtlAdjustPrivilege(20)</text>
  <text x="640" y="344" fill="#888" font-size="10">NtOpenProcess x 2</text>
  <line x1="410" y1="360" x2="410" y2="394" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="200" y="394" width="420" height="54" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="419" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">3. Scan system handle table</text>
  <text x="410" y="435" text-anchor="middle" fill="#111" font-size="12">Find WfpAle device + Token handle</text>
  <text x="640" y="404" fill="#888" font-size="10">SystemHandleInformationEx</text>
  <text x="640" y="418" fill="#888" font-size="10">Type-check then name-check</text>
  <line x1="410" y1="448" x2="410" y2="482" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="50" y="482" width="720" height="195" rx="6" fill="#eaf0fa" stroke="#2c5aa0" stroke-width="2"/>
  <text x="410" y="508" text-anchor="middle" fill="#2c5aa0" font-size="14" font-weight="bold">4. Kernel-Space Token Duplication (tcpip.sys)</text>
  <text x="410" y="530" text-anchor="middle" fill="#555" font-size="12">IOCTLs tell tcpip.sys to duplicate the token entirely in the kernel.</text>
  <text x="410" y="546" text-anchor="middle" fill="#555" font-size="12">No user-mode DuplicateToken call. User-mode hooks are not triggered.</text>
  <rect x="95" y="564" width="190" height="44" rx="4" fill="#fff" stroke="#888" stroke-width="1"/>
  <text x="190" y="584" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">IOCTL 0x128000</text>
  <text x="190" y="600" text-anchor="middle" fill="#111" font-size="12">Insert SYSTEM token</text>
  <line x1="285" y1="586" x2="315" y2="586" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="315" y="564" width="190" height="44" rx="4" fill="#fff" stroke="#888" stroke-width="1"/>
  <text x="410" y="584" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">IOCTL 0x124008</text>
  <text x="410" y="600" text-anchor="middle" fill="#111" font-size="12">Retrieve by LUID</text>
  <line x1="505" y1="586" x2="535" y2="586" stroke="#c0392b" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="535" y="564" width="190" height="44" rx="4" fill="#fff" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="630" y="584" text-anchor="middle" fill="#2c5aa0" font-size="11" font-weight="bold">SYSTEM token</text>
  <text x="630" y="600" text-anchor="middle" fill="#2c5aa0" font-size="11" font-weight="bold">obtained</text>
  <text x="410" y="632" text-anchor="middle" fill="#555" font-size="11">Token passed through WFP kernel hash table.</text>
  <text x="410" y="648" text-anchor="middle" fill="#2c5aa0" font-size="11" font-weight="bold">Zero user-mode token API calls.</text>
  <line x1="410" y1="677" x2="410" y2="711" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="200" y="711" width="420" height="54" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="736" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">5. NtDuplicateToken — Impersonation token</text>
  <text x="410" y="752" text-anchor="middle" fill="#111" font-size="12">SecurityImpersonation + TOKEN_ALL_ACCESS</text>
  <text x="640" y="721" fill="#888" font-size="10">Converts kernel-obtained</text>
  <text x="640" y="735" fill="#888" font-size="10">token for thread use</text>
  <line x1="410" y1="765" x2="410" y2="799" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="200" y="799" width="420" height="40" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="824" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">6. NtSetInformationThread + BeaconUseToken</text>
  <text x="640" y="809" fill="#888" font-size="10">Demon thread now</text>
  <text x="640" y="823" fill="#888" font-size="10">runs as SYSTEM</text>
  <line x1="410" y1="839" x2="410" y2="873" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="200" y="873" width="420" height="48" rx="4" fill="#eafaf1" stroke="#2e8b57" stroke-width="1.5"/>
  <text x="410" y="895" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">7. Cleanup</text>
  <text x="410" y="911" text-anchor="middle" fill="#333" font-size="11">Close handles, zero-wipe decoded strings</text>
  <line x1="410" y1="933" x2="410" y2="967" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="425" y="954" text-anchor="start" fill="#555" font-size="11">callback to client</text>
  <rect x="170" y="967" width="480" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="993" text-anchor="middle" fill="#111" font-size="12" font-weight="bold">[+] OK — verify with token getuid or nfexec whoami</text>
  <rect x="270" y="1027" width="12" height="12" rx="2" fill="#eaf0fa" stroke="#2c5aa0" stroke-width="1"/>
  <text x="286" y="1038" fill="#444" font-size="10">= Kernel-space operation</text>
  <rect x="450" y="1027" width="12" height="12" rx="2" fill="#eafaf1" stroke="#2e8b57" stroke-width="1"/>
  <text x="466" y="1038" fill="#444" font-size="10">= Anti-forensics</text>
</svg>