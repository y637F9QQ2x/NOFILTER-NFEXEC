<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 926" font-family="Segoe UI,Arial,sans-serif" font-size="13">
  <rect width="580" height="926" fill="#fff"/>
  <text x="290" y="30" text-anchor="middle" fill="#111" font-size="17" font-weight="bold">NOFILTER — OPSEC Measures</text>
  <text x="290" y="48" text-anchor="middle" fill="#888" font-size="11">Why each protection exists, what threat it counters, and how it works</text>
  <rect x="15" y="68" width="550" height="138" rx="6" fill="#eaf0fa" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="33" y="90" fill="#2c5aa0" font-size="13" font-weight="bold">1. Kernel-Space Token Duplication</text>
  <text x="33" y="114" fill="#111" font-size="12" font-weight="bold">Threat:</text>
  <text x="103" y="114" fill="#444" font-size="12">EDR hooks user-mode token APIs (DuplicateTokenEx,</text>
  <text x="103" y="130" fill="#444" font-size="12">OpenProcessToken). Any call triggers an alert.</text>
  <text x="33" y="156" fill="#111" font-size="12" font-weight="bold">Solution:</text>
  <text x="103" y="156" fill="#444" font-size="12">NOFILTER sends IOCTLs to tcpip.sys. The WFP code</text>
  <text x="103" y="172" fill="#444" font-size="12">duplicates the token in kernel memory. User-mode</text>
  <text x="103" y="188" fill="#444" font-size="12">hooks do not fire because the operation is in the kernel.</text>
  <rect x="15" y="220" width="550" height="138" rx="6" fill="#eafaf1" stroke="#2e8b57" stroke-width="1.5"/>
  <text x="33" y="242" fill="#2e8b57" font-size="13" font-weight="bold">2. Indirect Syscalls (Havoc NtApi[] Table)</text>
  <text x="33" y="266" fill="#111" font-size="12" font-weight="bold">Threat:</text>
  <text x="103" y="266" fill="#444" font-size="12">EDR hooks ntdll.dll by overwriting prologues with JMP.</text>
  <text x="103" y="282" fill="#444" font-size="12">Calling ntdll functions passes through these hooks.</text>
  <text x="33" y="308" fill="#111" font-size="12" font-weight="bold">Solution:</text>
  <text x="103" y="308" fill="#444" font-size="12">All Nt* route through Havoc NtApi[] table. It extracts</text>
  <text x="103" y="324" fill="#444" font-size="12">the syscall number and jumps to a syscall instruction</text>
  <text x="103" y="340" fill="#444" font-size="12">inside ntdll, bypassing the hooked entry point.</text>
  <rect x="15" y="372" width="550" height="138" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="33" y="394" fill="#333" font-size="13" font-weight="bold">3. XOR-Encoded Strings + Memory Scrubbing</text>
  <text x="33" y="418" fill="#111" font-size="12" font-weight="bold">Threat:</text>
  <text x="103" y="418" fill="#444" font-size="12">AV/EDR scan for known suspicious strings. WfpAle,</text>
  <text x="103" y="434" fill="#444" font-size="12">lsass.exe, services.exe would flag immediately.</text>
  <text x="33" y="460" fill="#111" font-size="12" font-weight="bold">Solution:</text>
  <text x="103" y="460" fill="#444" font-size="12">All IOC strings XOR-encrypted. Decoded on stack, used</text>
  <text x="103" y="476" fill="#444" font-size="12">briefly, zeroed with memset. Static scans and memory</text>
  <text x="103" y="492" fill="#444" font-size="12">dumps post-execution find nothing.</text>
  <rect x="15" y="524" width="550" height="122" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="33" y="546" fill="#333" font-size="13" font-weight="bold">4. COFF Symbol Table Sanitization</text>
  <text x="33" y="570" fill="#111" font-size="12" font-weight="bold">Threat:</text>
  <text x="103" y="570" fill="#444" font-size="12">COFF .o files have function names in plaintext.</text>
  <text x="103" y="586" fill="#444" font-size="12">find_handles, ioc_ref reveal technique.</text>
  <text x="33" y="612" fill="#111" font-size="12" font-weight="bold">Solution:</text>
  <text x="103" y="612" fill="#444" font-size="12">objcopy --redefine-syms replaces all 20 symbols with</text>
  <text x="103" y="628" fill="#444" font-size="12">meaningless names (_f0, _e1) at build time.</text>
  <rect x="15" y="660" width="550" height="122" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="33" y="682" fill="#333" font-size="13" font-weight="bold">5. Opaque Error Messages</text>
  <text x="33" y="706" fill="#111" font-size="12" font-weight="bold">Threat:</text>
  <text x="103" y="706" fill="#444" font-size="12">Token duplication failed etc. end up in the binary.</text>
  <text x="103" y="722" fill="#444" font-size="12">Extractable with the strings command.</text>
  <text x="33" y="748" fill="#111" font-size="12" font-weight="bold">Solution:</text>
  <text x="103" y="748" fill="#444" font-size="12">All replaced with codes: [!] E01-E11, [+] S1-S9.</text>
  <text x="103" y="764" fill="#444" font-size="12">Lookup table in source comments (stripped at build).</text>
  <rect x="15" y="796" width="550" height="106" rx="6" fill="#eafaf1" stroke="#2e8b57" stroke-width="1.5"/>
  <text x="33" y="818" fill="#2e8b57" font-size="13" font-weight="bold">6. Zero KERNEL32 Imports</text>
  <text x="33" y="842" fill="#111" font-size="12" font-weight="bold">Threat:</text>
  <text x="103" y="842" fill="#444" font-size="12">KERNEL32.dll is the most common EDR hook target.</text>
  <text x="33" y="868" fill="#111" font-size="12" font-weight="bold">Solution:</text>
  <text x="103" y="868" fill="#444" font-size="12">NOFILTER has zero KERNEL32 imports. SCM uses ADVAPI32</text>
  <text x="103" y="884" fill="#444" font-size="12">(required). All else uses NTDLL indirect syscalls.</text>
</svg>